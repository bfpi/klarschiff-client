name: Stylesheets

on:
  - workflow_dispatch

permissions:
  contents: read

jobs:
  stylelint:
    name: CSS files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
      - run: bin/stylelint
