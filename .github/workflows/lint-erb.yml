name: ERB Templates

on:
  - workflow_dispatch

jobs:
  erblint:
    name: ERB files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Run ERB Lint
        run: bin/erblint
