name: Build and Push via Docker Compose

on:
  push:
    branches:
      - docker
      - test
      - master
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------
      # 1) Image Name aus docker-compose holen
      # --------------------------------------------------
      - name: Get image name from docker compose
        id: image
        run: |
          IMAGE=$(docker compose config --format json | jq -r '.services.web.image')
          IMAGE_BASE="${IMAGE%:latest}"
          echo "image=$IMAGE_BASE" >> $GITHUB_OUTPUT

      # --------------------------------------------------
      # 2) Tags generieren (branch/tag only)
      # --------------------------------------------------
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag

      # --------------------------------------------------
      # 3) Build + Push (buildx statt compose build)
      # --------------------------------------------------
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # --------------------------------------------------
      # 4) latest nur für docker branch
      #
      # in step 2 könnte der latest-Tag auch gesetzt werden, wenn es der master-branch sein soll
      # dann wäe step 4 (hier) nicht mehr notwendig
      # type=raw,value=latest,enable={{is_default_branch}}
      # --------------------------------------------------
      - name: Push latest tag (only docker branch)
        if: github.ref_name == 'docker'
        run: |
          IMAGE=$(docker compose config --format json | jq -r '.services.web.image')
          IMAGE_BASE="${IMAGE%:latest}"

          docker pull "${IMAGE_BASE}:docker"
          docker tag "${IMAGE_BASE}:docker" "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:latest"

      # --------------------------------------------------
      # 5) Cleanup
      # --------------------------------------------------
      - name: Docker logout
        if: always()
        run: docker logout ghcr.io
